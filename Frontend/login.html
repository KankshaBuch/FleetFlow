<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | FleetFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-slate-800">FleetFlow</h1>
      <p class="text-slate-500 text-sm mt-1">Fleet Management System</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">
          Email
        </label>
        <input 
          type="email" 
          id="email"
          required
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          placeholder="manager@fleetflow.com"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">
          Password
        </label>
        <input 
          type="password" 
          id="password"
          required
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          placeholder="••••••••"
        >
      </div>

      <!-- Role Selection -->
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-2">
          Select Role
        </label>
        <select 
          id="role"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"
        >
          <option value="manager">Manager</option>
          <option value="dispatcher">Dispatcher</option>
        </select>
      </div>

      <!-- Forgot Password -->
      <div class="text-right text-sm">
        <a href="#" class="text-indigo-600 hover:underline">
          Forgot Password?
        </a>
      </div>

      <!-- Login Button -->
      <button 
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg font-medium transition"
      >
        Login
      </button>

      <!-- Error Message -->
      <p id="errorMessage" class="text-red-500 text-sm hidden text-center">
        Invalid credentials.
      </p>

    </form>

  </div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  // Demo Credentials
  const users = {
    manager: { email: "manager@fleetflow.com", password: "1234" },
    dispatcher: { email: "dispatcher@fleetflow.com", password: "1234" }
  };

  if (
    email === users[role].email &&
    password === users[role].password
  ) {
    // Save role in localStorage
    localStorage.setItem("userRole", role);

    // Redirect based on role
    if (role === "manager") {
      window.location.href = "index.html";
    } else {
      window.location.href = "trips.html";
    }

  } else {
    document.getElementById("errorMessage").classList.remove("hidden");
  }
});
</script>

</body>
</html>
