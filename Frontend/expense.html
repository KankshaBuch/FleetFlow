<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Log - FleetFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<script>
fetch("sidebar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("sidebar").innerHTML = data;

    const current = window.location.pathname.split("/").pop();
    document.querySelectorAll(".nav-link").forEach(link => {
      if (link.getAttribute("href") === current) {
        link.classList.add("bg-indigo-600","text-white","font-medium");
      }
    });
  });
</script>

</html>

<body class="bg-slate-50 text-slate-800">

<div class="flex min-h-screen">

  <div id="sidebar"></div>


  <!-- Main Content -->
  <main class="flex-1 p-8">

    <!-- Header Section -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-slate-800">Expense Log</h1>
        <p class="text-slate-500 text-sm">Track fuel costs & other expenses</p>
      </div>

      <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium shadow">
        + Add Expense
      </button>
    </div>

    <!-- Total Fuel Card -->
    <div class="mb-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 w-64">
        <p class="text-xs uppercase text-slate-400 font-medium mb-2">
          Total Fuel Costs
        </p>
        <h2 class="text-2xl font-bold text-slate-800">$600</h2>
      </div>
    </div>

    <!-- Expense Table -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-600 uppercase text-xs">
          <tr>
            <th class="p-4 text-left">ID</th>
            <th class="p-4 text-left">Vehicle</th>
            <th class="p-4 text-left">Type</th>
            <th class="p-4 text-left">Amount</th>
            <th class="p-4 text-left">Note</th>
            <th class="p-4 text-left">Date</th>
          </tr>
        </thead>
        <tbody class="text-slate-700">

          <tr class="border-t">
            <td class="p-4">E001</td>
            <td class="p-4">Volvo VNL 860 (V002)</td>
            <td class="p-4">Fuel</td>
            <td class="p-4 font-medium">$320</td>
            <td class="p-4">Diesel fill-up I-94</td>
            <td class="p-4">2026-02-20</td>
          </tr>

          <tr class="border-t">
            <td class="p-4">E002</td>
            <td class="p-4">Freightliner Cascadia (V001)</td>
            <td class="p-4">Fuel</td>
            <td class="p-4 font-medium">$280</td>
            <td class="p-4">Diesel fill-up I-80</td>
            <td class="p-4">2026-02-19</td>
          </tr>

        </tbody>
      </table>
    </div>

  </main>

</div>
